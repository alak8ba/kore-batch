services:
  postgres:
    image: postgres:16-alpine
    container_name: kore-batch-postgres
    environment:
      POSTGRES_DB: batchdb
      POSTGRES_USER: batch_user
      POSTGRES_PASSWORD: batch_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batch_user -d batchdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
