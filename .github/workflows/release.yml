name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish kore-batch sur GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Extraire la version depuis le tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Mettre a jour la version Maven
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build et publication sur GitHub Packages
        run: mvn -B deploy -pl kore-batch -am -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Creer la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## kore-batch ${{ github.ref_name }}

            Socle Spring Batch - Java 21 / Spring Boot 3.3 / Spring Batch 5

            ### Installation

            ```xml
            <dependency>
                <groupId>dev.kore.batch</groupId>
                <artifactId>kore-batch</artifactId>
                <version>${{ steps.version.outputs.VERSION }}</version>
            </dependency>
            ```
          draft: false
          prerelease: false
