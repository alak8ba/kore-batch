name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  publish-core:
    name: Publish kore-batch (socle)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Publish kore-batch sur GitHub Packages
        run: mvn -B deploy -pl kore-batch -am -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: Build & Test kore-batch-sample
    runs-on: ubuntu-latest
    needs: publish-core
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configurer accès GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Tests unitaires
        run: mvn -B test -pl kore-batch-sample

      - name: Tests d'intégration (Testcontainers)
        run: mvn -B failsafe:integration-test failsafe:verify -pl kore-batch-sample
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            kore-batch-sample/target/surefire-reports/
            kore-batch-sample/target/failsafe-reports/
          retention-days: 7
