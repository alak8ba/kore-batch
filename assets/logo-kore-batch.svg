<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-batch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f1a"/>
      <stop offset="100%" style="stop-color:#0d1a0d"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Fond hexagonal -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-batch)" stroke="#4ade80" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.3"/>

  <!-- Engrenage symbolique (cercle + dents) -->
  <circle cx="100" cy="88" r="22" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="100" cy="88" r="12" fill="#4ade80" opacity="0.15"/>
  <circle cx="100" cy="88" r="5" fill="#4ade80"/>

  <!-- Dents engrenage -->
  <g stroke="#4ade80" stroke-width="2.5" stroke-linecap="round">
    <line x1="100" y1="62" x2="100" y2="70"/>
    <line x1="100" y1="106" x2="100" y2="114"/>
    <line x1="74" y1="88" x2="82" y2="88"/>
    <line x1="118" y1="88" x2="126" y2="88"/>
    <line x1="81.5" y1="69.5" x2="87.2" y2="75.2"/>
    <line x1="112.8" y1="100.8" x2="118.5" y2="106.5"/>
    <line x1="118.5" y1="69.5" x2="112.8" y2="75.2"/>
    <line x1="87.2" y1="100.8" x2="81.5" y2="106.5"/>
  </g>

  <!-- Texte KORE -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#4ade80" letter-spacing="3">KORE</text>

  <!-- Texte Batch -->
  <text x="100" y="166" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="11" fill="#4ade80" opacity="0.6" letter-spacing="5">BATCH</text>
</svg>
