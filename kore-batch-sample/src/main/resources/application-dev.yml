spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/batchdb
    driver-class-name: org.postgresql.Driver
    username: batch_user
    password: batch_pass

# Surcharger le fichier via --inputFile=/chemin/vers/fichier au lancement

# SynchronizedItemStreamReader partage le reader entre les partitions de facon thread-safe.
# gridSize=4 : 4 workers se partagent les 200 items (pas de doublon).
batch:
  partitioning:
    grid-size: 4

logging:
  level:
    dev.kore.batch: DEBUG
    org.springframework.batch: DEBUG
    org.springframework.jdbc: DEBUG
