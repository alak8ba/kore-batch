spring:
  application:
    name: kore-batch-sample
  main:
    web-application-type: none
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

batch:
  partitioning:
    pool-size: 4
    queue-capacity: 50
    grid-size: 4

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:default}

logging:
  level:
    dev.kore.batch: INFO
    org.springframework.batch: INFO
