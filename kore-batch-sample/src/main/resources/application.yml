spring:
  application:
    name: kore-batch-sample
  main:
    web-application-type: none
  batch:
    job:
      enabled: false  # Le batch est lancé manuellement via BatchLauncher
    jdbc:
      initialize-schema: always  # Crée les tables Spring Batch au démarrage (H2 en dev)
  datasource:
    url: jdbc:postgresql://localhost:5432/batchdb
    driver-class-name: org.postgresql.Driver
    username: batch_user
    password: batch_pass
  jpa:
    hibernate:
      ddl-auto: none

batch:
  partitioning:
    pool-size: 4
    queue-capacity: 50
    grid-size: 4

logging:
  level:
    fr.kore.batch: DEBUG
    org.springframework.batch: INFO
