services:
  postgres:
    image: postgres:16-alpine
    container_name: kore-batch-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-batchdb}
      POSTGRES_USER: ${DB_USER:-batch_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Ecoute uniquement sur localhost (pas expose sur le reseau)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-batch_user} -d ${DB_NAME:-batchdb}"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_prod_data:
    name: kore-batch-postgres-prod-data
